<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Landing Page</title>
  <link rel="stylesheet" href="style.css">
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
  <!-- Font Awesome -->
  <script src="https://kit.fontawesome.com/yourkit.js" crossorigin="anonymous"></script>
</head>
<body>
  <!-- Header -->
  <header>
    <nav>
      <h2 class="logo">MyBrand</h2>
      <ul>
        <li><a href="#">Home</a></li>
        <li><a href="#">About</a></li>
        <li><a href="#">Contact</a></li>
      </ul>
    </nav>
  </header>

  <!-- Hero -->
  <section id="hero">
    <h1>Welcome to MyBrand</h1>
    <p>Building modern web solutions with style</p>
    <a href="#" class="btn">Get Started</a>
  </section>

  <!-- Features -->
  <section id="features">
    <div class="card">
      <i class="fas fa-bolt"></i>
      <h3>Fast</h3>
      <p>Lightning‑quick performance for your projects.</p>
    </div>
    <div class="card">
      <i class="fas fa-mobile-alt"></i>
      <h3>Responsive</h3>
      <p>Looks great on any device.</p>
    </div>
    <div class="card">
      <i class="fas fa-lock"></i>
      <h3>Secure</h3>
      <p>Top‑notch security built in.</p>
    </div>
  </section>

  <!-- Footer -->
  <footer>
    <p>© 2026 MyBrand | <a href="#">Privacy</a> | <a href="#">Terms</a></p>
  </footer>
</body>
</html>
